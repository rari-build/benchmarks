  eslint:
    '@antfu/eslint-config': ^9.0.0
    '@eslint-react/eslint-plugin': ^5.9.0
    eslint: ^10.5.0
    eslint-plugin-oxlint: ^1.70.0
    eslint-plugin-react-refresh: ^0.5.3
  md:
    '@types/markdown-it': ^14.1.2
    markdown-it: ^14.2.0
  nextjs:
    next: ^16.2.9
  react:
    '@types/react': ^19.2.17
    '@types/react-dom': ^19.2.3
    react: ^19.2.7
    react-dom: ^19.2.7
  tailwind:
    '@tailwindcss/postcss': ^4.3.1
