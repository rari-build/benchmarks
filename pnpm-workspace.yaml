catalogMode: prefer
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
packages:
  - apps/nextjs
  - apps/rari
  - shared
catalogs:
  build:
    vite: ^8.0.0
  default:
    '@types/node': ^25.5.0
    '@typescript/native-preview': ^7.0.0-dev.20260318.1
    oxlint: ^1.56.0
    rari: ^0.10.22
    typescript: ^5.9.3
  eslint:
    '@antfu/eslint-config': ^7.7.3
    '@eslint-react/eslint-plugin': ^2.13.0
    eslint: ^10.0.3
    eslint-plugin-oxlint: ^1.56.0
    eslint-plugin-react-hooks: ^7.0.1
    eslint-plugin-react-refresh: ^0.5.2
  md:
    '@types/markdown-it': ^14.1.2
    markdown-it: ^14.1.1
  nextjs:
    next: ^16.2.0
  react:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.4
    react-dom: ^19.2.4
  tailwind:
    '@tailwindcss/postcss': ^4.2.2
    '@tailwindcss/vite': ^4.2.2
    tailwindcss: ^4.2.2
