catalogMode: prefer
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
packages:
  - apps/nextjs
  - apps/rari
  - shared
catalogs:
  build:
    vite: ^8.0.9
  default:
    '@types/node': ^25.6.0
    '@typescript/native-preview': ^7.0.0-dev.20260421.2
    oxlint: ^1.61.0
    rari: ^0.10.25
    typescript: ^5.9.3
  eslint:
    '@antfu/eslint-config': ^8.2.0
    '@eslint-react/eslint-plugin': ^3.0.0
    eslint: ^10.2.1
    eslint-plugin-oxlint: ^1.61.0
    eslint-plugin-react-hooks: ^7.1.1
    eslint-plugin-react-refresh: ^0.5.2
  md:
    '@types/markdown-it': ^14.1.2
    markdown-it: ^14.1.1
  nextjs:
    next: ^16.2.4
  react:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.5
    react-dom: ^19.2.5
  tailwind:
    '@tailwindcss/postcss': ^4.2.4
    '@tailwindcss/vite': ^4.2.4
    tailwindcss: ^4.2.4
