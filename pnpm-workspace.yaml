catalogMode: prefer
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
packages:
  - apps/nextjs
  - apps/rari
  - shared
catalogs:
  build:
    vite: ^8.0.13
  default:
    '@types/node': ^25.8.0
    '@typescript/native-preview': ^7.0.0-dev.20260514.1
    oxlint: ^1.64.0
    rari: ^0.13.6
    typescript: ^5.9.3
  eslint:
    '@antfu/eslint-config': ^9.0.0
    '@eslint-react/eslint-plugin': ^5.7.8
    eslint: ^10.3.0
    eslint-plugin-oxlint: ^1.64.0
    eslint-plugin-react-hooks: ^7.1.1
    eslint-plugin-react-refresh: ^0.5.2
  md:
    '@types/markdown-it': ^14.1.2
    markdown-it: ^14.1.1
  nextjs:
    next: ^16.2.6
  react:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.6
    react-dom: ^19.2.6
  tailwind:
    '@tailwindcss/postcss': ^4.3.0
    '@tailwindcss/vite': ^4.3.0
    tailwindcss: ^4.3.0
allowBuilds:
  sharp: true
